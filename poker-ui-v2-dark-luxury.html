<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker UI v2 - 暗黑奢华</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #050a05;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      padding: 20px;
    }

    .version-label {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(138, 43, 226, 0.9);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: bold;
      z-index: 1000;
    }

    /* 牌桌 */
    .table {
      position: relative;
      width: 700px;
      height: 400px;
      background:
        radial-gradient(ellipse at 50% 30%, #1a3d2e 0%, #0d2318 40%, #050f08 100%);
      border-radius: 50%;
      border: 3px solid #2a2a2a;
      box-shadow:
        0 0 0 8px #1a1a1a,
        0 0 0 12px #333,
        0 0 80px rgba(0,0,0,0.9),
        inset 0 0 120px rgba(0,0,0,0.6);
      margin-bottom: 80px;
    }

    .table::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(45deg, #f4c430, #e74c3c, #9b59b6, #3498db, #f4c430) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
    }

    .community-area {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .community-cards {
      display: flex;
      gap: 10px;
    }

    /* 扑克牌 - 3D效果 */
    .poker-card {
      width: 72px;
      height: 100px;
      background: linear-gradient(160deg, #ffffff 0%, #f8f8f8 30%, #eeeeee 70%, #e0e0e0 100%);
      border-radius: 10px;
      position: relative;
      box-shadow:
        3px 5px 15px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .poker-card:hover {
      transform: translateY(-5px);
      box-shadow: 5px 10px 25px rgba(0,0,0,0.7);
    }

    .poker-card.red { color: #c41e3a; }
    .poker-card.black { color: #1a1a1a; }

    .card-corner {
      position: absolute;
      top: 6px;
      left: 6px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .card-rank {
      font-size: 1.5rem;
      font-weight: 900;
      font-family: 'Georgia', serif;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 1px rgba(0,0,0,0.15);
    }

    /* 数字比字母矮，需要往上移 */
    .card-rank.num {
      transform: translateY(-1px);
    }

    .card-suit-small {
      font-size: 1.3rem;
      line-height: 1;
    }

    /* 方片比较瘦，拉宽一点 */
    .poker-card.red .card-suit-small:first-child {
      transform: scale(1.2, 1);
    }

    .card-suit-large {
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-size: 3.6rem;
      opacity: 1;
    }

    /* 方片大图标拉宽 */
    .card-suit-large.diamond {
      transform: scaleX(1.3);
      right: 4px;
      bottom: 2px;
    }

    .poker-card.face-down {
      background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 100%);
      border: 2px solid #4a3020;
    }

    .card-back {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,200,100,0.1), transparent 50%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 5px,
          rgba(255,255,255,0.03) 5px,
          rgba(255,255,255,0.03) 10px
        );
    }

    .card-back::before {
      content: '♠♥♦♣';
      font-size: 0.6rem;
      color: rgba(255,200,100,0.3);
      letter-spacing: 2px;
    }

    .pot-info {
      text-align: center;
    }

    .pot {
      font-size: 1.4rem;
      font-weight: bold;
      color: #f4c430;
      text-shadow: 0 0 20px rgba(244, 196, 48, 0.5);
    }

    .phase {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 6px;
    }

    /* 玩家座位 */
    .seat {
      position: absolute;
      width: 105px;
      padding: 12px 10px;
      background: linear-gradient(180deg, rgba(20,20,20,0.98), rgba(10,10,10,0.98));
      border: 2px solid #444;
      border-radius: 50%;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
      transition: all 0.3s;
    }

    .seat-bottom {
      bottom: -115px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      border-radius: 60px;
    }

    .seat-left {
      left: -125px;
      top: 50%;
      transform: translateY(-50%);
    }

    .seat-right {
      right: -125px;
      top: 50%;
      transform: translateY(-50%);
    }

    .seat-top {
      top: -105px;
      left: 50%;
      transform: translateX(-50%);
    }

    .seat.current-turn {
      border-color: #f4c430;
      box-shadow: 0 0 30px rgba(244, 196, 48, 0.5);
    }

    .player-name {
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 6px;
      white-space: nowrap;
    }

    .dealer-btn {
      display: inline-block;
      background: linear-gradient(135deg, #f4c430, #c9a000);
      color: #000;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 0.7rem;
      font-weight: bold;
      line-height: 22px;
      margin-right: 4px;
      box-shadow: 0 2px 8px rgba(244, 196, 48, 0.4);
    }

    .player-chips {
      font-size: 0.8rem;
      color: #f4c430;
    }

    /* 手牌 - 倾斜布局 */
    .player-cards {
      display: flex;
      justify-content: center;
      margin-top: 10px;
      position: relative;
      height: 82px;
    }

    .player-cards .poker-card {
      width: 72px;
      height: 100px;
      position: absolute;
      transition: transform 0.2s;
    }

    .player-cards .card-1 {
      transform: rotate(-15deg) translateX(-16px);
      z-index: 1;
    }

    .player-cards .card-2 {
      transform: rotate(15deg) translateX(16px);
      z-index: 2;
      margin-left: -22px;
    }

    .player-cards .poker-card:hover {
      transform: rotate(0deg) translateY(-5px);
    }

    .player-cards .card-rank { font-size: 1.2rem; }
    .player-cards .card-suit-small { font-size: 1.1rem; }
    .player-cards .card-suit-large { font-size: 3.4rem; bottom: 6px; right: 6px; }

    /* 操作面板 */
    .action-panel {
      display: flex;
      gap: 12px;
      padding: 16px 35px;
      background: rgba(15,15,15,0.95);
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      margin-top: 20px;
      backdrop-filter: blur(10px);
    }

    .action-panel button {
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .btn-fold { background: linear-gradient(135deg, #c0392b, #96281b); color: #fff; }
    .btn-check { background: linear-gradient(135deg, #2980b9, #1f6391); color: #fff; }
    .btn-call { background: linear-gradient(135deg, #27ae60, #1e8449); color: #fff; }
    .btn-raise { background: linear-gradient(135deg, #e67e22, #d35400); color: #fff; }
    .btn-allin { background: linear-gradient(135deg, #8e44ad, #6c3483); color: #fff; }

    .action-panel button:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="version-label">版本2: 暗黑奢华</div>

  <div class="table">
    <div class="community-area">
      <div class="community-cards">
        <div class="poker-card red">
          <div class="card-corner top-left"><span class="card-rank">K</span><span class="card-suit-small">♥</span></div>
          <div class="card-suit-large">♥</div>
        </div>
        <div class="poker-card black">
          <div class="card-corner top-left"><span class="card-rank">T</span><span class="card-suit-small">♣</span></div>
          <div class="card-suit-large">♣</div>
        </div>
        <div class="poker-card red">
          <div class="card-corner top-left"><span class="card-rank num">9</span><span class="card-suit-small">♦</span></div>
          <div class="card-suit-large diamond">♦</div>
        </div>
        <div class="poker-card red">
          <div class="card-corner top-left"><span class="card-rank num">7</span><span class="card-suit-small">♥</span></div>
          <div class="card-suit-large">♥</div>
        </div>
        <div class="poker-card face-down">
          <div class="card-back"></div>
        </div>
      </div>
      <div class="pot-info">
        <div class="pot">底池: 💰 500</div>
        <div class="phase">河牌圈</div>
      </div>
    </div>

    <div class="seat seat-bottom current-turn">
      <div class="player-name"><span class="dealer-btn">D</span>Player1</div>
      <div class="player-chips">💰 1000</div>
      <div class="player-cards">
        <div class="poker-card red card-1">
          <div class="card-corner top-left"><span class="card-rank">A</span><span class="card-suit-small">♥</span></div>
          <div class="card-suit-large">♥</div>
        </div>
        <div class="poker-card black card-2">
          <div class="card-corner top-left"><span class="card-rank">K</span><span class="card-suit-small">♣</span></div>
          <div class="card-suit-large">♣</div>
        </div>
      </div>
    </div>

    <div class="seat seat-left">
      <div class="player-name">Player2</div>
      <div class="player-chips">💰 800</div>
    </div>

    <div class="seat seat-right">
      <div class="player-name">Player3</div>
      <div class="player-chips">💰 1200</div>
    </div>

    <div class="seat seat-top">
      <div class="player-name">Player4</div>
      <div class="player-chips">💰 600</div>
    </div>
  </div>

  <div class="action-panel">
    <button class="btn-fold">弃牌</button>
    <button class="btn-check">过牌</button>
    <button class="btn-call">跟注 50</button>
    <button class="btn-raise">加注</button>
    <button class="btn-allin">ALL IN</button>
  </div>
</body>
</html>
